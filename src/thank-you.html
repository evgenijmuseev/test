<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Raleway:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
    <title>Успешная отправка</title>
    <style>
        body {
            background-color: #9F6FF9;
        }
        .thank {
            text-align: center;
        }
        .thank-block {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            flex-direction: column;
            align-items: center;
            color: #fff
        }
        .thank__title {
            font-size: 3rem;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 13px;
        }
        .thank__subtitle {
            display: block;
            margin-bottom: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
        }
        .thank__link {
            font-size: 1.5rem;
            margin-top: 30px;
            color: #fff
        }
    </style>
</head>
<body>
    <div class="thank">
        <div class="container">
            <div class="thank-block">
                <h1 class="thank__title">Спасибо за заявку!</h1>
                <span class="thank__subtitle">В скором времени мы с вами свяжемся</span> <!-- /.error__subtitle -->
                <img src="img/thankyou-img.png" alt="" class="thank__img">
                <!-- /.error__title -->
                <a href="index.html" class="thank__link">Главная</a>
            </div>
            <!-- /.error-block -->
        </div>
        <!-- /.container -->
    </div>
    <!-- /.error -->
</body>
</html>
